<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biblioteca — Registro</title>
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: #f5ede0;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(180,130,70,0.04) 40px,
          rgba(180,130,70,0.04) 41px
        );
        font-family: 'Lato', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .bib-card {
        background: #fffdf8;
        border: 1px solid #c9a96e;
        border-radius: 14px;
        padding: 2.5rem 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 32px rgba(122,79,30,0.10);
      }

      .bib-title {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 600;
        color: #4a2f0e;
        margin: 0 0 6px;
        text-align: center;
      }

      .bib-subtitle {
        font-size: 13px;
        color: #9e7a50;
        text-align: center;
        margin: 0 0 1.5rem;
        font-weight: 300;
        letter-spacing: 0.3px;
      }

      .bib-ornament {
        text-align: center;
        color: #c9a96e;
        font-size: 16px;
        letter-spacing: 8px;
        margin-bottom: 1.6rem;
      }

      .bib-label {
        font-size: 11px;
        font-weight: 700;
        color: #7a4f1e;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: 6px;
        display: block;
      }

      .bib-input {
        width: 100%;
        border: 1px solid #d4b483;
        border-radius: 7px;
        padding: 11px 14px;
        font-size: 14px;
        font-family: 'Lato', sans-serif;
        background: #fdf8f0;
        color: #4a2f0e;
        margin-bottom: 18px;
        outline: none;
        transition: border-color 0.2s;
      }

      .bib-input:focus {
        border-color: #7a4f1e;
        background: #fffdf8;
      }

      .bib-input::placeholder {
        color: #c9a96e;
        font-weight: 300;
      }

      .bib-btn {
        width: 100%;
        background: #7a4f1e;
        color: #f5d98a;
        border: none;
        border-radius: 7px;
        padding: 13px;
        font-size: 12px;
        font-family: 'Lato', sans-serif;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 4px;
        transition: background 0.2s;
      }

      .bib-btn:hover {
        background: #5c3a14;
      }

      .bib-footer {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: #9e7a50;
      }

      .bib-footer a {
        color: #4a2f0e;
        font-weight: 700;
        text-decoration: none;
      }

      .bib-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>

    <div class="bib-card">
      <h1 class="bib-title">Crear cuenta</h1>
      <p class="bib-subtitle">Únete ahora</p>
      <div class="bib-ornament">· · ·</div>

      <form method="POST" action="usuarios.php">
        <label class="bib-label" for="nombre">Nombre completo</label>
        <input class="bib-input" type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>

        <label class="bib-label" for="email">Correo electrónico</label>
        <input class="bib-input" type="email" id="email" name="email" placeholder="tu@correo.com" required>

        <label class="bib-label" for="pwd">Contraseña</label>
        <input class="bib-input" type="password" id="pwd" name="pwd" placeholder="••••••••" required>

        <button class="bib-btn" type="submit">Registrarse</button>
      </form>

      <p class="bib-footer">
        ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
      </p>
    </div>

  </body>
</html>
